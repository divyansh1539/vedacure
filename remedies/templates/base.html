{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VedaCure</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
    <div class="logo">VedaCure</div>

    <button class="menu-toggle" aria-label="Toggle menu">☰</button>

    <ul class="nav-links">
        <li><a href="{% url 'home' %}">Home</a></li>
        <li><a href="{% url 'services' %}">Services</a></li>
        <li><a href="{% url 'ai_suggest' %}">AI Suggest</a></li>
        <li><a href="{% url 'about' %}">About</a></li>
        <li><a href="{% url 'blog' %}">Blog</a></li>
        <li><a href="{% url 'contact' %}">Contact</a></li>
    </ul>

    <a href="javascript:void(0)" class="bot-btn" id="openBot">VedaBOT</a>
</nav>

<!-- ================= PAGE CONTENT ================= -->
<div id="page" class="page">
    {% block content %}{% endblock %}
</div>

<div class="page-reveal" id="pageReveal"></div>

<!-- ================= VEDABOT ================= -->
<div id="chatBox" class="chat-box">
    <div class="chat-header">
        <span>VedaBOT 🤖</span>
        <button id="closeBot">✖</button>
    </div>

    <div class="chat-body" id="chatBody">
        <div class="bot-msg">Hi, I am VedaBOT 🤖. How can I help you?</div>
    </div>

    <div class="chat-footer">
        <input type="text" id="userInput" placeholder="Ask something...">
        <button id="sendBtn">Send</button>
    </div>
</div>

<!-- ================= BOT SCRIPT ================= -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const openBot = document.getElementById("openBot");
    const closeBot = document.getElementById("closeBot");
    const chatBox = document.getElementById("chatBox");
    const sendBtn = document.getElementById("sendBtn");
    const userInput = document.getElementById("userInput");
    const chatBody = document.getElementById("chatBody");

    openBot.onclick = () => chatBox.style.display = "flex";
    closeBot.onclick = () => chatBox.style.display = "none";

    function sendMessage() {
        const msg = userInput.value.trim();
        if (!msg) return;

        const userDiv = document.createElement("div");
        userDiv.className = "user-msg";
        userDiv.innerText = msg;
        chatBody.appendChild(userDiv);

        userInput.value = "";
        chatBody.scrollTop = chatBody.scrollHeight;

        fetch("/vedabot/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msg }),
        })
        .then(res => res.json())
        .then(data => {
            const botDiv = document.createElement("div");
            botDiv.className = "bot-msg";
            botDiv.innerText = data.reply;
            chatBody.appendChild(botDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        })
        .catch(() => {
            const botDiv = document.createElement("div");
            botDiv.className = "bot-msg";
            botDiv.innerText = "Something went wrong.";
            chatBody.appendChild(botDiv);
        });
    }

    sendBtn.onclick = sendMessage;
    userInput.addEventListener("keypress", e => {
        if (e.key === "Enter") sendMessage();
    });
});
</script>

<script src="{% static 'main.js' %}"></script>
<script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
<script src="https://unpkg.com/gsap@3/dist/ScrollTrigger.min.js"></script>

</body>
</html>
