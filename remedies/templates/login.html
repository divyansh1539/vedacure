{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VedaCure - Login</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <style>
        /* ================= LOGIN PAGE STYLES ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #44c34a 0%, #18371a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            animation: loginPageFadeIn 0.8s ease-out;
        }

        @keyframes loginPageFadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: cardSlideUp 0.8s ease-out 0.15s both;
        }

        @keyframes cardSlideUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #44c34a 0%, #2fa83d 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 12px;
            animation: logoFloat 0.8s ease-out 0.3s both;
        }

        @keyframes logoFloat {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            animation: titleSlideIn 0.8s ease-out 0.4s both;
        }

        @keyframes titleSlideIn {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header p {
            font-size: 0.95rem;
            opacity: 0.95;
            animation: subtitleSlideIn 0.8s ease-out 0.5s both;
        }

        @keyframes subtitleSlideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
            animation: formFieldFadeIn 0.6s ease-out both;
        }

        .form-group:nth-child(1) { animation-delay: 0.6s; }
        .form-group:nth-child(2) { animation-delay: 0.65s; }

        @keyframes formFieldFadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            color: #0f2a17;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            background: #f9fafb;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            outline: none;
        }

        input:focus {
            background: white;
            border-color: #44c34a;
            box-shadow: 0 0 0 4px rgba(68, 195, 74, 0.1);
        }

        input::placeholder {
            color: #999;
        }

        .form-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 0.5px;
            animation: buttonFadeIn 0.6s ease-out 0.7s both;
        }

        @keyframes buttonFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-login {
            background: linear-gradient(135deg, #44c34a 0%, #2fa83d 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(68, 195, 74, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(68, 195, 74, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            animation: linkFadeIn 0.6s ease-out 0.75s both;
        }

        @keyframes linkFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .signup-link p {
            color: #666;
            font-size: 0.9rem;
        }

        .signup-link a {
            color: #44c34a;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .signup-link a:hover {
            text-decoration: underline;
            color: #2fa83d;
        }

        .messages {
            margin-bottom: 20px;
        }

        .message {
            padding: 14px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            animation: messageSlideDown 0.4s ease-out;
            margin-bottom: 10px;
        }

        @keyframes messageSlideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .forgot-password {
            text-align: right;
            margin-top: 12px;
            margin-bottom: 12px;
            animation: linkFadeIn 0.6s ease-out 0.7s both;
        }

        .forgot-password a {
            color: #44c34a;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        .forgot-password a:hover {
            color: #2fa83d;
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .login-card {
                border-radius: 16px;
            }

            .login-header {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 28px;
            }

            .login-body {
                padding: 30px 20px;
            }

            button {
                width: 100%;
            }
        }

        .login-container::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        .login-container::after {
            content: '';
            position: fixed;
            bottom: -10%;
            left: -5%;
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            animation: float 10s ease-in-out infinite 1s;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-30px);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">🌿</div>
                <h1>VedaCure</h1>
                <p>Ancient Wisdom, Modern Wellness</p>
            </div>

            <div class="login-body">
                {% if messages %}
                    <div class="messages">
                        {% for message in messages %}
                            <div class="message {% if message.tags %}{{ message.tags }}{% endif %}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="username">Username</label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            placeholder="Enter your username"
                            required
                            autofocus
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                    </div>

                    <div class="forgot-password">
                        <a href="{% url 'password_reset' %}">Forgot Password?</a>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn-login">Login</button>
                    </div>
                </form>

                <div class="signup-link">
                    <p>Don't have an account? <a href="{% url 'signup' %}">Sign up here</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
